<svg width="1800" height="1100" viewBox="0 0 1800 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#eefdf7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faff"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8fbf5"/>
      <stop offset="100%" stop-color="#e9f3ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f78c9"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <text x="900" y="72" text-anchor="middle" font-size="44" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#174e87" font-weight="700">水培农业管理系统后端 · 系统模块架构图</text>
  <text x="900" y="112" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3a6f9b">基于 README_CN.md 模块定义（L22-29）</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" rx="24" ry="24" width="1640" height="120" fill="url(#card)" stroke="#8ab9e3" stroke-width="2"/>
    <text x="220" y="248" text-anchor="middle" font-size="34" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1d5f97" font-weight="700">cmd/api</text>
    <text x="940" y="248" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3a688b">应用入口：启动配置、依赖初始化、HTTP 服务启动</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="340" rx="24" ry="24" width="1640" height="140" fill="url(#card)" stroke="#8ab9e3" stroke-width="2"/>
    <text x="260" y="415" text-anchor="middle" font-size="34" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1d5f97" font-weight="700">internal/platform</text>
    <text x="980" y="402" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3a688b">基础设施层：配置加载、数据库客户端、中间件、统一响应</text>
    <text x="980" y="440" text-anchor="middle" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3a688b">连接 MySQL / InfluxDB / EMQX（MQTT）并提供公共能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="540" rx="24" ry="24" width="1640" height="380" fill="url(#core)" stroke="#67b7a5" stroke-width="3"/>
    <text x="900" y="598" text-anchor="middle" font-size="34" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#0e665b" font-weight="700">业务模块层（internal/*）</text>

    <rect x="130" y="640" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="310" y="685" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">auth</text>
    <text x="310" y="723" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">JWT / 用户角色 / RBAC</text>

    <rect x="530" y="640" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="710" y="685" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">device</text>
    <text x="710" y="723" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">设备/分组 CRUD 与关联</text>

    <rect x="930" y="640" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="1110" y="685" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">telemetry</text>
    <text x="1110" y="723" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">最新/历史/统计 + 保留策略</text>

    <rect x="1330" y="640" rx="18" ry="18" width="340" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="1500" y="685" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">control</text>
    <text x="1500" y="723" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">命令 / 规则 / 模板</text>

    <rect x="280" y="780" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="460" y="825" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">alert</text>
    <text x="460" y="863" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">告警列表 / 状态 / 统计</text>

    <rect x="720" y="780" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="900" y="825" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">audit</text>
    <text x="900" y="863" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">审计日志写入与查询</text>

    <rect x="1160" y="780" rx="18" ry="18" width="360" height="110" fill="#ffffff" stroke="#8ec1e8" stroke-width="2"/>
    <text x="1340" y="825" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#165a91">overview</text>
    <text x="1340" y="863" text-anchor="middle" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3e6380">设备状态与告警聚合</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="960" rx="24" ry="24" width="1640" height="100" fill="url(#card)" stroke="#8ab9e3" stroke-width="2"/>
    <text x="240" y="1022" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1d5f97" font-weight="700">外部依赖</text>
    <text x="960" y="1022" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3a688b">MySQL（业务数据） · InfluxDB（时序数据） · EMQX/MQTT（消息通信）</text>
  </g>

  <path d="M900 300 L900 338" stroke="#2f78c9" stroke-width="7" marker-end="url(#arrow)" fill="none"/>
  <path d="M900 480 L900 535" stroke="#2f78c9" stroke-width="7" marker-end="url(#arrow)" fill="none"/>
  <path d="M900 920 L900 958" stroke="#2f78c9" stroke-width="7" marker-end="url(#arrow)" fill="none"/>

  <text x="1540" y="176" text-anchor="end" font-size="20" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#5b7f9f">分层结构：入口层 → 平台层 → 业务层 → 依赖层</text>
</svg>
