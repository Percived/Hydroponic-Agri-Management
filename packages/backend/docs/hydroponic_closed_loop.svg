<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef9f6"/>
      <stop offset="100%" stop-color="#e8f1ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5fbff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2176c9"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="90" text-anchor="middle" font-size="46" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#114b79" font-weight="700">水培农业管理系统后端可追踪闭环</text>
  <text x="800" y="140" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#2d6f9f">温室设备 · 传感器 · 控制指令 · 告警联动</text>

  <g filter="url(#shadow)">
    <rect x="120" y="320" rx="24" ry="24" width="280" height="170" fill="url(#card)" stroke="#86bde6" stroke-width="2"/>
    <text x="260" y="385" text-anchor="middle" font-size="38" font-family="Microsoft YaHei, PingFang SC, sans-serif">温室设备</text>
    <text x="260" y="430" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3f6280">泵阀 / 灯光 / 风机</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="140" rx="24" ry="24" width="280" height="170" fill="url(#card)" stroke="#86bde6" stroke-width="2"/>
    <text x="640" y="205" text-anchor="middle" font-size="38" font-family="Microsoft YaHei, PingFang SC, sans-serif">传感器</text>
    <text x="640" y="250" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3f6280">温湿度 / pH / EC / CO₂</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="970" y="320" rx="24" ry="24" width="380" height="210" fill="url(#card)" stroke="#67b6a6" stroke-width="3"/>
    <text x="1160" y="385" text-anchor="middle" font-size="40" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#0b5f53" font-weight="700">后端平台</text>
    <text x="1160" y="435" text-anchor="middle" font-size="28" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#2c6f67">规则引擎 · 数据分析 · 审计追踪</text>
    <text x="1160" y="475" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#2c6f67">Go + Gin + MySQL + InfluxDB + MQTT</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="590" rx="24" ry="24" width="280" height="170" fill="url(#card)" stroke="#86bde6" stroke-width="2"/>
    <text x="640" y="655" text-anchor="middle" font-size="38" font-family="Microsoft YaHei, PingFang SC, sans-serif">告警中心</text>
    <text x="640" y="700" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3f6280">阈值告警 / 规则告警</text>
  </g>

  <path d="M420 355 C 510 285, 540 260, 600 250" fill="none" stroke="#2176c9" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="500" y="275" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1f5d95">遥测上报</text>

  <path d="M780 250 C 860 260, 900 300, 970 355" fill="none" stroke="#2176c9" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="860" y="255" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1f5d95">数据入库</text>

  <path d="M970 480 C 900 560, 850 620, 780 655" fill="none" stroke="#2176c9" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="850" y="585" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1f5d95">告警触发</text>

  <path d="M500 655 C 420 620, 360 560, 300 490" fill="none" stroke="#2176c9" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="350" y="585" font-size="24" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1f5d95">控制指令</text>

  <path d="M260 320 C 260 240, 360 160, 500 160" fill="none" stroke="#2baf8c" stroke-width="6" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
  <text x="305" y="210" font-size="22" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1f8f74">设备状态回传</text>

  <circle cx="800" cy="450" r="350" fill="none" stroke="#5ab7e6" stroke-width="4" stroke-dasharray="10 12" opacity="0.5"/>
  <text x="800" y="830" text-anchor="middle" font-size="28" font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#1c5f89" font-weight="700">可追踪闭环：采集 → 分析 → 决策 → 执行 → 告警 → 追溯</text>
</svg>
